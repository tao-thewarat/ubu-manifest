apiVersion: v1
kind: Namespace
metadata:
  name: thaijo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thaijo-api
  namespace: thaijo
spec:
  replicas: 9
  selector:
    matchLabels:
      app: thaijo-api
  template:
    metadata:
      labels:
        app: thaijo-api
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: thaijo-api
      containers:
        - name: api
          image: taotoxicboy/thaijo:dev-20260224.3
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: redis://thaijo-redis:6379/0
          command:
            - uvicorn
            - main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thaijo-redis
  namespace: thaijo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thaijo-redis
  template:
    metadata:
      labels:
        app: thaijo-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: thaijo-redis
  namespace: thaijo
spec:
  selector:
    app: thaijo-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: thaijo-api
  namespace: thaijo
spec:
  selector:
    app: thaijo-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: admin@iaaaiksu.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thaijo-api
  namespace: thaijo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thaijo.iaaaiksu.com
      secretName: thaijo-iaaaiksu-com-tls
  rules:
    - host: thaijo.iaaaiksu.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thaijo-api
                port:
                  number: 80
